<!doctype html>
<html>
  <head>
    <title>MUT</title>

    <script>
      var ShowMe = () => {
        color = Array("red", "green", "blue", "yellow", "#FF00FF");
        document.write('<table border="1" width="100%">');

        var row = 12;
        var col = 11;

        for (let i = 1; i <= row; i++) {
          document.write("<tr>");

          for (let j = 2; j <= 12; j++) {
            // สีแบบเดียวกับที่อาจารย์สอน
            let bg = j - 2 <= i - 1 ? "red" : "green";

            document.write(
              `<td style="background-color:${bg};">
                ${j} × ${i} = ${j * i}
              </td>`,
            );
          }

          document.write("</tr>");
        }

        document.write("</table>");
      };
    </script>
  </head>

  <body>
    <input type="button" value="Click Me" onclick="ShowMe()" />

    Mahanakorn<br />

  </body>
</html>
